<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asgard Extension</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #4f46e5;
    }
    .header .logo {
      width: 32px; height: 32px;
      background: #6366f1;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #e0e7ff; }
    .header p  { font-size: 11px; color: #a5b4fc; margin-top: 1px; }

    .body { padding: 16px; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .status-pill.active   { background: #14532d; color: #86efac; }
    .status-pill.inactive { background: #1c1c2e; color: #64748b; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .dot.green  { background: #22c55e; animation: pulse 1.5s infinite; }
    .dot.grey   { background: #475569; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 5px; }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }

    .btn {
      width: 100%;
      padding: 9px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.start { background: #4f46e5; color: #fff; }
    .btn.stop  { background: #7f1d1d; color: #fca5a5; }

    .info {
      margin-top: 14px;
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
    }
    .info a { color: #818cf8; text-decoration: none; }
    .info a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <h1>Asgard Extension</h1>
      <p>Falkor browser control</p>
    </div>
  </div>

  <div class="body">
    <div id="statusPill" class="status-pill inactive">
      <span class="dot grey" id="dot"></span>
      <span id="statusText">Inactive</span>
    </div>

    <label for="pinInput">Agent PIN</label>
    <input type="password" id="pinInput" placeholder="Enter your AGENT_PIN" autocomplete="off" />

    <button id="mainBtn" class="btn start">Connect</button>

    <div class="info">
      Connects to <a href="https://falkor-desktop.luckdragon.io" target="_blank">falkor-desktop.luckdragon.io</a><br/>
      Falkor can then navigate, screenshot, click &amp; type in your active tab.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
